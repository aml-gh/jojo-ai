<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جوجو AI - تحت الصيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a3d2e 0%, #1a5d4a 50%, #2d8659 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container {
            max-width: 550px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 5em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 2.2em;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffffff, #b8e6cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 25px;
            opacity: 0.95;
        }
        
        p {
            font-size: 1.1em;
            line-height: 1.9;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(76, 175, 80, 0.25);
            padding: 12px 30px;
            border-radius: 50px;
            margin-top: 25px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            font-weight: 700;
            font-size: 1.05em;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
        }
        
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.7;
        }
        
        .dots {
            display: inline-block;
        }
        
        .dots span {
            display: inline-block;
            opacity: 0;
            animation: dotAnimation 1.5s infinite;
        }
        
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.3s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }
        
        @keyframes dotAnimation {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
            h1 { font-size: 1.7em; }
            .logo { font-size: 4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔧</div>
        <h1>جوجو AI</h1>
        <p class="subtitle">الموقع تحت الصيانة</p>
        <p>نعمل حالياً على تحديث وتطوير الموقع<br>لتقديم تجربة أفضل لكم</p>
        <p>شكراً لصبركم وتفهمكم 💚</p>
        <div class="badge">
            سنعود قريباً<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
        <div class="footer">
            بلدية الطائف - مساعد موسم الحج الذكي
        </div>
    </div>
</body>
</html>
